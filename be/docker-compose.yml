
services:
  db:
    image: postgres:16
    container_name: flooring_db
    restart: always
    environment:
      
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: flooring_db
    ports:
      - "5432:5432" 
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: flooring_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  
  api:
    build: 
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/flooring_db
      REDIS_URL: redis://redis:6379
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    depends_on:
      - db
      - redis
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  redis_data: